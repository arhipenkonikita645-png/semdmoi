<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta 
        name="viewport" 
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    >
    <meta 
        name="description" 
        content="School PRO Messenger - Enterprise Edition"
    >
    <meta 
        name="theme-color" 
        content="#0e1621"
    >
    <title>School PRO | Web</title>
    
    <!-- Разрешение CSP для выполнения скриптов и Socket.io -->
    <meta http-equiv="Content-Security-Policy" content="default-src * data: blob: 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; style-src * 'unsafe-inline';">
    
    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Подключение Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <!-- ==========================================
         РАЗДЕЛ 1: CSS СТИЛИ (ENTERPRISE BEM)
         ========================================== -->
    <style>
        /* --- CSS VARIABLES (ТОКЕНЫ ДИЗАЙНА) --- */
        :root[data-theme="dark"] {
            --color-bg-base: #0e1621;
            --color-bg-sidebar: #17212b;
            --color-bg-surface: #202b36;
            --color-bg-hover: #232e3a;
            --color-bg-active: #2b5278;
            --color-bg-input: #17212b;
            
            --color-msg-in: #182533;
            --color-msg-out: #2b5278;
            
            --color-text-primary: #ffffff;
            --color-text-secondary: #7f91a4;
            --color-text-hint: rgba(255, 255, 255, 0.4);
            
            --color-accent: #5288c1;
            --color-accent-hover: #4175b0;
            
            --color-danger: #e53935;
            --color-success: #4caf50;
            
            --color-border: rgba(255, 255, 255, 0.08);
            --color-overlay: rgba(0, 0, 0, 0.6);
            --shadow-elevation: 0 4px 15px rgba(0, 0, 0, 0.3);
            
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-circle: 50%;
            
            --transition-fast: 0.15s ease-in-out;
            --transition-base: 0.25s ease-in-out;
            --font-family: 'Roboto', sans-serif;
        }

        :root[data-theme="light"] {
            --color-bg-base: #e2e5e8;
            --color-bg-sidebar: #ffffff;
            --color-bg-surface: #f1f3f4;
            --color-bg-hover: #f4f4f5;
            --color-bg-active: #e3f2fd;
            --color-bg-input: #f1f3f4;
            
            --color-msg-in: #ffffff;
            --color-msg-out: #e3ffc4;
            
            --color-text-primary: #000000;
            --color-text-secondary: #707579;
            --color-text-hint: rgba(0, 0, 0, 0.4);
            
            --color-accent: #3390ec;
            --color-accent-hover: #227bd6;
            
            --color-danger: #e53935;
            --color-success: #4caf50;
            
            --color-border: rgba(0, 0, 0, 0.08);
            --color-overlay: rgba(0, 0, 0, 0.4);
            --shadow-elevation: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* --- БАЗОВЫЙ СБРОС --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            background-color: var(--color-bg-base);
            color: var(--color-text-primary);
            font-family: var(--font-family);
            font-size: 15px;
            line-height: 1.5;
        }

        a {
            color: var(--color-accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* --- СКРОЛЛБАР --- */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: var(--color-border);
            border-radius: var(--radius-lg);
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: var(--color-text-secondary);
        }

        /* --- УТИЛИТЫ --- */
        .d-none {
            display: none !important;
        }

        .icon {
            display: inline-block;
            width: 24px;
            height: 24px;
            fill: currentColor;
            vertical-align: middle;
            transition: fill var(--transition-fast);
        }

        /* --- КОМПОНЕНТЫ: АВАТАР --- */
        .avatar {
            border-radius: var(--radius-circle);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-weight: 500;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: var(--color-accent);
            user-select: none;
            position: relative;
        }

        .avatar--sm {
            width: 40px;
            height: 40px;
            font-size: 16px;
        }

        .avatar--md {
            width: 50px;
            height: 50px;
            font-size: 20px;
        }

        .avatar--lg {
            width: 80px;
            height: 80px;
            font-size: 32px;
        }

        .avatar--xl {
            width: 120px;
            height: 120px;
            font-size: 48px;
        }

        .avatar__online-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background-color: var(--color-success);
            border: 2px solid var(--color-bg-sidebar);
            border-radius: var(--radius-circle);
        }

        /* --- КОМПОНЕНТЫ: КНОПКИ --- */
        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            border: none;
            outline: none;
            transition: background-color var(--transition-fast), transform var(--transition-fast);
            border-radius: var(--radius-sm);
            padding: 12px 24px;
            font-size: 15px;
        }

        .btn--primary {
            background-color: var(--color-accent);
            color: #ffffff;
            width: 100%;
        }

        .btn--primary:hover {
            background-color: var(--color-accent-hover);
        }

        .btn--primary:active {
            transform: scale(0.98);
        }

        .btn--danger {
            background-color: transparent;
            color: var(--color-danger);
            border: 1px solid var(--color-danger);
        }

        .btn--danger:hover {
            background-color: var(--color-danger);
            color: #ffffff;
        }

        .btn-icon {
            background-color: transparent;
            border: none;
            color: var(--color-text-secondary);
            width: 40px;
            height: 40px;
            border-radius: var(--radius-circle);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color var(--transition-fast), color var(--transition-fast);
        }

        .btn-icon:hover {
            color: var(--color-accent);
            background-color: var(--color-bg-hover);
        }

        /* --- КОМПОНЕНТЫ: ФОРМЫ --- */
        .form-group {
            margin-bottom: 20px;
            width: 100%;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--color-text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--color-bg-input);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
            border-radius: var(--radius-sm);
            font-size: 15px;
            transition: border-color var(--transition-fast);
            outline: none;
        }

        .form-control:focus {
            border-color: var(--color-accent);
        }

        /* --- СТРУКТУРА: LAYOUT --- */
        .layout {
            display: flex;
            width: 100vw;
            height: 100dvh;
            position: relative;
        }

        /* --- СТРУКТУРА: SIDEBAR --- */
        .sidebar {
            width: 350px;
            min-width: 350px;
            height: 100%;
            background-color: var(--color-bg-sidebar);
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: transform var(--transition-base);
        }

        .sidebar__header {
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            flex-shrink: 0;
        }

        .sidebar__user {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .sidebar__user-name {
            font-weight: 500;
            font-size: 16px;
        }

        .sidebar__actions {
            display: flex;
            gap: 5px;
        }

        .sidebar__search-wrap {
            padding: 0 15px 15px;
            flex-shrink: 0;
        }

        .sidebar__search-input {
            width: 100%;
            padding: 10px 15px;
            background-color: var(--color-bg-input);
            border: none;
            border-radius: var(--radius-lg);
            color: var(--color-text-primary);
            outline: none;
            font-size: 14px;
        }

        .sidebar__search-input::placeholder {
            color: var(--color-text-hint);
        }

        .sidebar__list {
            flex-grow: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* --- КОМПОНЕНТЫ: CHAT ITEM --- */
        .chat-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            cursor: pointer;
            transition: background-color var(--transition-fast);
            user-select: none;
        }

        .chat-item:hover {
            background-color: var(--color-bg-surface);
        }

        .chat-item.is-active {
            background-color: var(--color-bg-active);
        }

        .chat-item__info {
            flex-grow: 1;
            margin-left: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .chat-item__top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .chat-item__name {
            font-weight: 500;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item__time {
            font-size: 12px;
            color: var(--color-text-secondary);
            flex-shrink: 0;
            margin-left: 10px;
        }

        .chat-item__bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item__preview {
            font-size: 14px;
            color: var(--color-text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item__badge {
            background-color: var(--color-accent);
            color: #ffffff;
            border-radius: var(--radius-lg);
            padding: 2px 8px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }

        /* --- СТРУКТУРА: CHAT AREA --- */
        .chat-area {
            flex-grow: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--color-bg-base);
            position: relative;
        }

        .chat-area__header {
            height: 60px;
            padding: 0 20px;
            background-color: var(--color-bg-sidebar);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            z-index: 5;
            cursor: pointer;
        }

        .chat-area__back-btn {
            display: none;
            margin-right: 15px;
        }

        .chat-area__header-info {
            display: flex;
            flex-direction: column;
            margin-left: 15px;
        }

        .chat-area__title {
            font-size: 16px;
            font-weight: 500;
        }

        .chat-area__status {
            font-size: 13px;
            color: var(--color-accent);
        }

        /* --- СТРУКТУРА: MESSAGES --- */
        .messages-scroll {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .messages-loader {
            text-align: center;
            padding: 10px;
            color: var(--color-text-secondary);
            font-size: 13px;
        }

        .msg-row {
            display: flex;
            width: 100%;
            position: relative;
        }

        .msg-row--in {
            justify-content: flex-start;
        }

        .msg-row--out {
            justify-content: flex-end;
        }

        .msg-bubble {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: var(--radius-md);
            position: relative;
            word-wrap: break-word;
            line-height: 1.4;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .msg-row--in .msg-bubble {
            background-color: var(--color-msg-in);
            border-bottom-left-radius: 4px;
        }

        .msg-row--out .msg-bubble {
            background-color: var(--color-msg-out);
            border-bottom-right-radius: 4px;
        }

        .msg-sender {
            font-size: 13px;
            font-weight: 500;
            color: var(--color-accent);
            margin-bottom: 4px;
            cursor: pointer;
        }
        .msg-sender:hover {
            text-decoration: underline;
        }

        .msg-text {
            font-size: 15px;
            white-space: pre-wrap;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 4px;
            float: right;
            margin-left: 20px;
        }

        .msg-time {
            font-size: 11px;
            color: var(--color-text-secondary);
        }

        .msg-ticks {
            width: 16px;
            height: 16px;
            fill: var(--color-text-secondary);
        }

        .msg-ticks--read {
            fill: var(--color-accent);
        }

        .msg-media {
            max-width: 100%;
            max-height: 300px;
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
            object-fit: cover;
            cursor: pointer;
        }

        .msg-audio {
            width: 250px;
            height: 40px;
            outline: none;
            border-radius: 20px;
        }

        .msg-deleted {
            font-style: italic;
            color: var(--color-text-secondary);
            font-size: 14px;
        }

        .msg-edited {
            font-size: 10px;
            opacity: 0.6;
            margin-left: 5px;
        }

        /* --- СТРУКТУРА: INPUT AREA --- */
        .input-footer {
            background-color: var(--color-bg-sidebar);
            padding: 12px 20px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            border-top: 1px solid var(--color-border);
            position: relative;
            z-index: 10;
        }

        .preview-panel {
            position: absolute;
            bottom: 100%;
            left: 0;
            width: 100%;
            background-color: var(--color-bg-sidebar);
            border-top: 1px solid var(--color-border);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 9;
        }

        .preview-img {
            width: 50px;
            height: 50px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background-color: #000;
        }

        .preview-info {
            flex-grow: 1;
            overflow: hidden;
        }

        .preview-name {
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .input-wrapper {
            flex-grow: 1;
            background-color: var(--color-bg-input);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: flex-end;
            padding: 5px 15px;
            border: 1px solid transparent;
            transition: border-color var(--transition-fast);
        }

        .input-wrapper:focus-within {
            border-color: var(--color-accent);
        }

        .input-textarea {
            width: 100%;
            background: none;
            border: none;
            color: var(--color-text-primary);
            padding: 10px 0;
            font-size: 15px;
            outline: none;
            resize: none;
            max-height: 150px;
            font-family: inherit;
        }

        .input-textarea::placeholder {
            color: var(--color-text-hint);
        }

        .btn-record {
            color: var(--color-accent);
        }

        .btn-record.is-recording {
            color: var(--color-danger);
            animation: pulseRecord 1s infinite;
        }

        @keyframes pulseRecord {
            0% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(229, 57, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0); }
        }

        .btn-send-msg {
            color: var(--color-accent);
        }

        /* --- СТРУКТУРА: CONTEXT MENU --- */
        .context-menu {
            position: fixed;
            background-color: var(--color-bg-surface);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-elevation);
            padding: 5px 0;
            min-width: 180px;
            z-index: 9999;
            display: none;
            border: 1px solid var(--color-border);
        }

        .context-menu__item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 15px;
            color: var(--color-text-primary);
            cursor: pointer;
            font-size: 14px;
            transition: background-color var(--transition-fast);
        }

        .context-menu__item:hover {
            background-color: var(--color-bg-active);
        }

        .context-menu__item--danger {
            color: var(--color-danger);
        }

        /* --- СТРУКТУРА: MODALS --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background-color: var(--color-overlay);
            z-index: 9000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--transition-base), visibility var(--transition-base);
        }

        .modal-overlay.is-active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background-color: var(--color-bg-sidebar);
            width: 90%;
            max-width: 400px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-elevation);
            transform: scale(0.95);
            transition: transform var(--transition-base);
            display: flex;
            flex-direction: column;
            max-height: 90dvh;
        }

        .modal-overlay.is-active .modal-box {
            transform: scale(1);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 500;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
        }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--color-border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* --- СПЕЦИФИЧНЫЕ МОДАЛКИ --- */
        .auth-logo {
            width: 80px;
            height: 80px;
            background-color: var(--color-accent);
            border-radius: var(--radius-circle);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
        }

        .auth-logo svg {
            width: 40px;
            height: 40px;
            fill: #ffffff;
        }

        .settings-avatar-wrap {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            cursor: pointer;
            border-radius: var(--radius-circle);
        }

        .settings-avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            border-radius: var(--radius-circle);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .settings-avatar-wrap:hover .settings-avatar-overlay {
            opacity: 1;
        }

        /* --- LIGHTBOX --- */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background-color: rgba(0,0,0,0.9);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--transition-base);
        }

        .lightbox-overlay.is-active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-img {
            max-width: 95vw;
            max-height: 95dvh;
            object-fit: contain;
            transform: scale(0.9);
            transition: transform var(--transition-base);
        }

        .lightbox-overlay.is-active .lightbox-img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ffffff;
            cursor: pointer;
            background-color: rgba(255,255,255,0.2);
            width: 50px;
            height: 50px;
            border-radius: var(--radius-circle);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- АДАПТИВНОСТЬ (MOBILE) --- */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                left: 0;
                top: 0;
            }

            .chat-area {
                width: 100%;
                position: absolute;
                left: 0;
                top: 0;
                transform: translateX(100%);
                transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
                z-index: 20;
            }

            .layout.is-chat-open .sidebar {
                transform: translateX(-30%);
                opacity: 0.5;
            }

            .layout.is-chat-open .chat-area {
                transform: translateX(0);
            }

            .chat-area__back-btn {
                display: block;
            }

            .msg-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>

    <!-- ==========================================
         РАЗДЕЛ 2: SVG SPRITES (ИКОНКИ)
         ========================================== -->
    <svg style="display: none;" aria-hidden="true">

    <!-- ==========================================
         РАЗДЕЛ 6: JAVASCRIPT ENTERPRISE LOGIC
         ========================================== -->
    <script>
        /**
         * ГЛОБАЛЬНАЯ КОНФИГУРАЦИЯ ПРИЛОЖЕНИЯ
         */
        const CONFIG = {
            API_URL: 'https://maonteel.pythonanywhere.com', // <-- ВАШ ДОМЕН
            MAX_FILE_SIZE_MB: 50,
            MSG_LIMIT: 30,
            LOCAL_STORAGE_KEYS: {
                TOKEN: 'school_pro_jwt_token',
                USER: 'school_pro_user_data',
                THEME: 'school_pro_theme'
            }
        };

        /**
         * КЛАСС STORE
         * Отвечает за хранение глобального состояния приложения.
         */
        class AppStore {
            constructor() {
                this.token = localStorage.getItem(CONFIG.LOCAL_STORAGE_KEYS.TOKEN);
                
                // БЕЗОПАСНОЕ чтение данных пользователя (защита от синего экрана)
                try {
                    this.me = JSON.parse(localStorage.getItem(CONFIG.LOCAL_STORAGE_KEYS.USER) || 'null');
                } catch (error) {
                    console.error('Ошибка чтения данных, кэш сброшен');
                    this.me = null;
                    localStorage.removeItem(CONFIG.LOCAL_STORAGE_KEYS.USER);
                    localStorage.removeItem(CONFIG.LOCAL_STORAGE_KEYS.TOKEN);
                    this.token = null;
                }
                
                this.socket = null;
                
                // Состояние текущего чата
                this.activeChatId = null;
                this.activeChatName = '';
                this.activeChatIsOnline = false;
                
                // Пагинация
                this.messagesOffset = 0;
                this.hasMoreMessages = true;
                this.isFetchingMessages = false;
                
                // Ввод
                this.mediaAttachment = null;
                this.editingMessageId = null;
                
                // Таймеры
                this.typingTimeout = null;
            }

            saveAuth(token, user) {
                this.token = token;
                this.me = user;
                localStorage.setItem(CONFIG.LOCAL_STORAGE_KEYS.TOKEN, token);
                localStorage.setItem(CONFIG.LOCAL_STORAGE_KEYS.USER, JSON.stringify(user));
            }

            clearAuth() {
                this.token = null;
                this.me = null;
                localStorage.removeItem(CONFIG.LOCAL_STORAGE_KEYS.TOKEN);
                localStorage.removeItem(CONFIG.LOCAL_STORAGE_KEYS.USER);
            }
        }

        const Store = new AppStore();

        /**
         * КЛАСС UTILS
         * Вспомогательные утилиты для форматирования, экранирования и т.д.
         */
        class Utils {
            /**
             * Выполняет защищенный запрос к REST API.
             */
            static async apiRequest(endpoint, method = 'GET', body = null) {
                const options = {
                    method,
                    headers: { 'Content-Type': 'application/json' }
                };

                if (Store.token) {
                    options.headers['Authorization'] = `Bearer ${Store.token}`;
                }

                if (body) {
                    options.body = JSON.stringify(body);
                }

                try {
                    const response = await fetch(`${CONFIG.API_URL}/api${endpoint}`, options);
                    const data = await response.json().catch(() => ({}));
                    
                    if (!response.ok) {
                        if (response.status === 401 && Store.token) {
                            App.Auth.logout();
                        }
                        throw new Error(data.error || 'Ошибка сервера');
                    }
                    
                    return data;
                } catch (error) {
                    throw error;
                }
            }

            static getAvatarStyle(username, avatarData) {
                if (avatarData && avatarData.length > 10) {
                    return `url(${avatarData})`;
                }
                const colors = ['#e53935', '#1e88e5', '#43a047', '#fb8c00', '#8e24aa', '#3949ab', '#00acc1'];
                let hash = 0;
                for (let i = 0; i < (username || '').length; i++) {
                    hash = username.charCodeAt(i) + ((hash << 5) - hash);
                }
                const color = colors[Math.abs(hash) % colors.length];
                return `linear-gradient(135deg, ${color}, #222222)`;
            }

            static formatTime(isoString) {
                if (!isoString || isoString === "1970-01-01") return '';
                const date = new Date(isoString + 'Z');
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            static sanitizeHTML(str) {
                if (!str) return '';
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#x27;'
                };
                return str.replace(/[&<>"']/ig, match => map[match]);
            }

            static extractUrl(bgStr) {
                return bgStr.replace(/^url\(["']?/, '').replace(/["']?\)$/, '');
            }
        }

        /**
         * КЛАСС APP
         * Главный контроллер приложения, объединяющий все модули.
         */
        const App = {
            
            // --- МОДУЛЬ АВТОРИЗАЦИИ ---
            Auth: {
                isRegisterMode: false,
                
                check: () => {
                    if (Store.token && Store.me) {
                        App.bootstrap();
                    } else {
                        const authModal = document.getElementById('modal-auth');
                        authModal.classList.remove('d-none');
                        // Даем браузеру долю секунды на рендер перед добавлением класса анимации
                        setTimeout(() => authModal.classList.add('is-active'), 10);
                    }
                },
                
                toggleMode: () => {
                    App.Auth.isRegisterMode = !App.Auth.isRegisterMode;
                    const btn = document.getElementById('auth-btn-submit');
                    const subtitle = document.getElementById('auth-subtitle');
                    const toggle = document.getElementById('auth-toggle-text');
                    
                    if (App.Auth.isRegisterMode) {
                        btn.innerText = 'Создать аккаунт';
                        subtitle.innerText = 'Регистрация в системе';
                        toggle.innerText = 'Уже есть аккаунт? Войти';
                    } else {
                        btn.innerText = 'Войти в аккаунт';
                        subtitle.innerText = 'Вход в защищенную сеть';
                        toggle.innerText = 'Нет аккаунта? Зарегистрироваться';
                    }
                },
                
                submit: async (event) => {
                    event.preventDefault();
                    const usernameInput = document.getElementById('auth-username').value.trim();
                    const passwordInput = document.getElementById('auth-password').value;
                    const btn = document.getElementById('auth-btn-submit');
                    
                    if (!usernameInput || passwordInput.length < 4) {
                        return alert('Введите логин и пароль (минимум 4 символа)');
                    }
                    
                    btn.disabled = true;
                    btn.innerText = 'Загрузка...';
                    
                    try {
                        const endpoint = App.Auth.isRegisterMode ? '/register' : '/login';
                        const response = await Utils.apiRequest(endpoint, 'POST', {
                            username: usernameInput,
                            password: passwordInput
                        });
                        
                        Store.saveAuth(response.token, response.user);
                        
                        // Плавное закрытие окна
                        const authModal = document.getElementById('modal-auth');
                        authModal.classList.remove('is-active');
                        setTimeout(() => authModal.classList.add('d-none'), 300);
                        
                        App.bootstrap();
                        
                    } catch (error) {
                        alert(error.message);
                    } finally {
                        btn.disabled = false;
                        btn.innerText = App.Auth.isRegisterMode ? 'Создать аккаунт' : 'Войти в аккаунт';
                    }
                },
                
                logout: () => {
                    Store.clearAuth();
                    window.location.reload();
                }
            },

            // --- ИНИЦИАЛИЗАЦИЯ ПОСЛЕ АВТОРИЗАЦИИ ---
            bootstrap: () => {
                document.getElementById('app-layout').classList.remove('d-none');
                App.Theme.init();
                App.UI.renderMyProfile();
                App.Socket.connect();
                App.ChatList.fetch();
                App.Observers.initPagination();
                
                document.addEventListener('click', App.ContextMenu.hide);
                
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        document.querySelectorAll('.modal-overlay.is-active, .lightbox-overlay.is-active').forEach(el => {
                            el.classList.remove('is-active');
                        });
                    }
                });
            },

            // --- УПРАВЛЕНИЕ ТЕМАМИ ---
            Theme: {
                init: () => {
                    const savedTheme = localStorage.getItem(CONFIG.LOCAL_STORAGE_KEYS.THEME) || 'dark';
                    document.documentElement.setAttribute('data-theme', savedTheme);
                },
                toggle: () => {
                    const currentTheme = document.documentElement.getAttribute('data-theme');
                    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-theme', newTheme);
                    localStorage.setItem(CONFIG.LOCAL_STORAGE_KEYS.THEME, newTheme);
                }
            },

            // --- WEBSOCKETS CONTROLLER ---
            Socket: {
                connect: () => {
                    Store.socket = io(CONFIG.API_URL, {
                        auth: { token: Store.token },
                        transports: ['websocket', 'polling']
                    });

                    Store.socket.on('new_message', (msg) => {
                        const isGlobalChatOpen = Store.activeChatId === null && msg.receiver_id === null;
                        const isPrivateChatOpen = Store.activeChatId !== null && 
                            ((msg.receiver_id === Store.activeChatId && msg.sender_id === Store.me.id) || 
                             (msg.sender_id === Store.activeChatId));

                        if (isGlobalChatOpen || isPrivateChatOpen) {
                            App.Chat.renderMessage(msg, true);
                            
                            if (msg.sender_id !== Store.me.id) {
                                Store.socket.emit('read_messages', {
                                    token: Store.token, 
                                    sender_id: msg.sender_id
                                });
                            }
                        }
                        
                        App.ChatList.fetch();
                    });

                    Store.socket.on('user_status', (data) => {
                        if (Store.activeChatId === data.user_id) {
                            Store.activeChatIsOnline = data.is_online;
                            const statusEl = document.getElementById('active-chat-status');
                            statusEl.innerText = data.is_online ? 'В сети' : `Был(а): ${Utils.formatTime(data.last_seen)}`;
                        }
                        App.ChatList.fetch();
                    });

                    Store.socket.on('typing', (data) => {
                        if (Store.activeChatId === data.sender_id) {
                            const statusEl = document.getElementById('active-chat-status');
                            statusEl.innerText = 'печатает...';
                            
                            clearTimeout(Store.typingTimeout);
                            Store.typingTimeout = setTimeout(() => {
                                statusEl.innerText = Store.activeChatIsOnline ? 'В сети' : 'Не в сети';
                            }, 3000);
                        }
                    });

                    Store.socket.on('messages_read', (data) => {
                        if (Store.activeChatId === data.reader_id) {
                            document.querySelectorAll('.msg-ticks').forEach(icon => {
                                icon.classList.add('msg-ticks--read');
                            });
                        }
                    });

                    Store.socket.on('message_deleted', (data) => {
                        const msgElement = document.getElementById(`msg-${data.msg_id}`);
                        if (msgElement) {
                            const bubble = msgElement.querySelector('.msg-bubble');
                            bubble.innerHTML = '<div class="msg-deleted">Сообщение удалено</div>';
                        }
                        App.ChatList.fetch();
                    });

                    Store.socket.on('message_edited', (data) => {
                        const msgElement = document.getElementById(`msg-${data.msg_id}`);
                        if (msgElement) {
                            const textNode = msgElement.querySelector('.msg-text');
                            if (textNode) {
                                textNode.innerText = data.text;
                                if (!msgElement.querySelector('.msg-edited')) {
                                    textNode.insertAdjacentHTML('afterend', '<span class="msg-edited">(изм.)</span>');
                                }
                            }
                        }
                        App.ChatList.fetch();
                    });
                }
            },

            // --- СПИСОК ЧАТОВ ---
            ChatList: {
                usersData: [],

                fetch: async (query = '') => {
                    try {
                        const users = await Utils.apiRequest(`/chats_summary?q=${query}`);
                        App.ChatList.usersData = users;
                        App.ChatList.render(users);
                    } catch (error) {
                        console.error('Ошибка загрузки чатов:', error);
                    }
                },

                handleSearch: (val) => {
                    const q = val.toLowerCase().trim();
                    const filtered = App.ChatList.usersData.filter(u => 
                        u.username.toLowerCase().includes(q)
                    );
                    App.ChatList.render(filtered);
                },

                render: (users) => {
                    const container = document.getElementById('chat-list-container');
                    container.innerHTML = '';

                    const isGlobalActive = Store.activeChatId === null;
                    container.innerHTML += `
                        <div class="chat-item ${isGlobalActive ? 'is-active' : ''}" onclick="App.Chat.openGlobal()">
                            <div class="avatar avatar--md" style="background: linear-gradient(135deg, #00c6ff, #0072ff);">
                                <svg class="icon"><use href="#icon-users"></use></svg>
                            </div>
                            <div class="chat-item__info">
                                <div class="chat-item__top">
                                    <span class="chat-item__name">Общий чат</span>
                                </div>
                                <div class="chat-item__bottom">
                                    <span class="chat-item__preview">Глобальная комната для всех</span>
                                </div>
                            </div>
                        </div>
                    `;

                    users.forEach(u => {
                        const isActive = Store.activeChatId === u.id;
                        const unreadBadge = u.unread_count > 0 ? `<div class="chat-item__badge">${u.unread_count}</div>` : '';
                        const onlineDot = u.is_online ? '<div class="avatar__online-dot"></div>' : '';
                        
                        const bgStyle = Utils.getAvatarStyle(u.username, u.avatar_data);
                        const avLetter = (u.avatar_data && u.avatar_data.length > 10) ? '' : u.username[0].toUpperCase();

                        container.innerHTML += `
                            <div class="chat-item ${isActive ? 'is-active' : ''}" onclick="App.Chat.openPrivate(${u.id}, '${Utils.sanitizeHTML(u.username)}', ${u.is_online}, '${u.last_seen}')">
                                <div class="avatar avatar--md" style="background-image: ${bgStyle}">
                                    ${avLetter}
                                    ${onlineDot}
                                </div>
                                <div class="chat-item__info">
                                    <div class="chat-item__top">
                                        <span class="chat-item__name">${Utils.sanitizeHTML(u.username)}</span>
                                        <span class="chat-item__time">${Utils.formatTime(u.last_msg_time)}</span>
                                    </div>
                                    <div class="chat-item__bottom">
                                        <span class="chat-item__preview">${Utils.sanitizeHTML(u.last_msg_text)}</span>
                                        ${unreadBadge}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
            },

            // --- ЛОГИКА ЧАТА ---
            Chat: {
                openGlobal: () => {
                    App.Chat.setupWorkspace(null, 'Общий чат', true, null);
                },

                openPrivate: (id, name, isOnline, lastSeen) => {
                    App.Chat.setupWorkspace(id, name, isOnline, lastSeen);
                },

                setupWorkspace: (id, name, isOnline, lastSeen) => {
                    Store.activeChatId = id;
                    Store.activeChatName = name;
                    Store.activeChatIsOnline = isOnline;
                    
                    Store.messagesOffset = 0;
                    Store.hasMoreMessages = true;
                    Store.isFetchingMessages = false;
                    
                    document.getElementById('chat-header').style.display = 'flex';
                    document.getElementById('input-footer').style.display = 'flex';
                    document.getElementById('app-layout').classList.add('is-chat-open');
                    
                    document.getElementById('active-chat-name').innerText = name;
                    
                    const statusEl = document.getElementById('active-chat-status');
                    if (id === null) {
                        statusEl.innerText = 'Глобальная комната';
                    } else {
                        statusEl.innerText = isOnline ? 'В сети' : `Был(а): ${Utils.formatTime(lastSeen)}`;
                    }

                    const avEl = document.getElementById('active-chat-avatar');
                    if (id === null) {
                        avEl.style.backgroundImage = 'linear-gradient(135deg, #00c6ff, #0072ff)';
                        avEl.innerHTML = '<svg class="icon" style="width:20px;height:20px;"><use href="#icon-users"></use></svg>';
                    } else {
                        const u = App.ChatList.usersData.find(x => x.id === id);
                        avEl.style.backgroundImage = Utils.getAvatarStyle(name, u?.avatar_data);
                        avEl.innerText = (u?.avatar_data && u.avatar_data.length > 10) ? '' : name[0].toUpperCase();
                    }

                    document.getElementById('messages-container').innerHTML = `
                        <div class="messages-loader d-none" id="messages-loader">Загрузка истории...</div>
                    `;
                    
                    App.ChatList.render(App.ChatList.usersData);
                    App.Chat.fetchHistory();
                },

                fetchHistory: async () => {
                    if (Store.isFetchingMessages || !Store.hasMoreMessages) return;
                    Store.isFetchingMessages = true;
                    
                    const loader = document.getElementById('messages-loader');
                    loader.classList.remove('d-none');
                    
                    try {
                        let endpoint = `/messages?offset=${Store.messagesOffset}&limit=${CONFIG.MSG_LIMIT}`;
                        if (Store.activeChatId !== null) {
                            endpoint += `&receiver_id=${Store.activeChatId}`;
                        }
                        
                        const messages = await Utils.apiRequest(endpoint);
                        
                        if (messages.length < CONFIG.MSG_LIMIT) {
                            Store.hasMoreMessages = false;
                        }
                        
                        const container = document.getElementById('messages-container');
                        const oldScrollHeight = container.scrollHeight;
                        
                        messages.forEach(msg => App.Chat.renderMessage(msg, false));
                        
                        if (Store.messagesOffset === 0) {
                            container.scrollTop = container.scrollHeight;
                        } else {
                            container.scrollTop = container.scrollHeight - oldScrollHeight;
                        }
                        
                        Store.messagesOffset += messages.length;
                        
                        if (Store.activeChatId !== null && messages.length > 0) {
                            Store.socket.emit('read_messages', {
                                token: Store.token,
                                sender_id: Store.activeChatId
                            });
                        }
                        
                    } catch (error) {
                        console.error('Fetch msgs error:', error);
                    } finally {
                        Store.isFetchingMessages = false;
                        loader.classList.add('d-none');
                    }
                },

                renderMessage: (msg, append = true) => {
                    const isMine = msg.sender_id === Store.me.id;
                    const container = document.getElementById('messages-container');
                    
                    let innerHTML = '';
                    
                    if (msg.is_deleted) {
                        innerHTML = '<div class="msg-deleted">Сообщение удалено</div>';
                    } else {
                        if (!isMine && Store.activeChatId === null) {
                            innerHTML += `<div class="msg-sender" onclick="App.UI.Profile.openOverride(${msg.sender_id})">${Utils.sanitizeHTML(msg.sender_name)}</div>`;
                        }

                        if (msg.media_type === 'image') {
                            innerHTML += `<img src="${msg.media_data}" class="msg-media" onclick="App.UI.Lightbox.open(this.src)" alt="media">`;
                        } else if (msg.media_type === 'audio') {
                            innerHTML += `<audio src="${msg.media_data}" class="msg-audio" controls></audio>`;
                        } else if (msg.media_type === 'document') {
                            innerHTML += `<a href="${msg.media_data}" download="document">📎 Скачать файл</a>`;
                        }

                        if (msg.text) {
                            innerHTML += `<div class="msg-text">${Utils.sanitizeHTML(msg.text)}</div>`;
                        }
                        
                        if (msg.is_edited) {
                            innerHTML += `<span class="msg-edited">(изм.)</span>`;
                        }
                    }

                    const timeStr = Utils.formatTime(msg.timestamp);
                    let ticksHtml = '';
                    if (isMine && Store.activeChatId !== null) {
                        const tickClass = msg.is_read ? 'msg-ticks msg-ticks--read' : 'msg-ticks';
                        ticksHtml = `<svg class="${tickClass}"><use href="#icon-check-double"></use></svg>`;
                    }
                    
                    innerHTML += `<div class="msg-meta"><span class="msg-time">${timeStr}</span>${ticksHtml}</div>`;

                    const row = document.createElement('div');
                    row.className = `msg-row ${isMine ? 'msg-row--out' : 'msg-row--in'}`;
                    row.id = `msg-${msg.id}`;
                    
                    const bubble = document.createElement('div');
                    bubble.className = 'msg-bubble';
                    bubble.innerHTML = innerHTML;
                    
                    if (isMine && !msg.is_deleted) {
                        bubble.oncontextmenu = (e) => App.ContextMenu.show(e, msg.id, msg.text);
                        let pressTimer;
                        bubble.ontouchstart = (e) => {
                            pressTimer = setTimeout(() => App.ContextMenu.show(e.touches[0], msg.id, msg.text), 600);
                        };
                        bubble.ontouchend = () => clearTimeout(pressTimer);
                        bubble.ontouchmove = () => clearTimeout(pressTimer);
                    }

                    row.appendChild(bubble);

                    if (append) {
                        container.appendChild(row);
                        container.scrollTop = container.scrollHeight;
                    } else {
                        const loader = document.getElementById('messages-loader');
                        container.insertBefore(row, loader.nextSibling);
                    }
                },

                handleTyping: (textarea) => {
                    textarea.style.height = 'auto';
                    textarea.style.height = textarea.scrollHeight + 'px';
                    
                    const hasText = textarea.value.trim().length > 0;
                    const hasMedia = Store.mediaAttachment !== null;
                    
                    if (hasText || hasMedia) {
                        document.getElementById('btn-record').classList.add('d-none');
                        document.getElementById('btn-send').classList.remove('d-none');
                    } else {
                        document.getElementById('btn-record').classList.remove('d-none');
                        document.getElementById('btn-send').classList.add('d-none');
                    }
                    
                    if (Store.activeChatId !== null) {
                        Store.socket.emit('typing', {
                            token: Store.token,
                            receiver_id: Store.activeChatId
                        });
                    }
                },

                handleKeyDown: (event) => {
                    if (event.key === 'Enter' && !event.shiftKey) {
                        event.preventDefault();
                        App.Chat.sendMessage();
                    }
                },

                sendMessage: () => {
                    const input = document.getElementById('message-input');
                    const text = input.value.trim();
                    
                    if (!text && !Store.mediaAttachment) return;

                    if (Store.editingMessageId) {
                        Store.socket.emit('edit_message', {
                            token: Store.token,
                            msg_id: Store.editingMessageId,
                            text: text
                        });
                        Store.editingMessageId = null;
                    } else {
                        Store.socket.emit('send_message', {
                            token: Store.token,
                            receiver_id: Store.activeChatId,
                            text: text,
                            media_type: Store.mediaAttachment?.type,
                            media_data: Store.mediaAttachment?.data
                        });
                    }

                    input.value = '';
                    input.style.height = 'auto';
                    App.Media.clear();
                    App.Chat.handleTyping(input);
                    input.focus();
                }
            },

            // --- ОБРАБОТКА МЕДИА-ФАЙЛОВ ---
            Media: {
                handleSelect: (event) => {
                    const file = event.target.files[0];
                    if (!file) return;
                    
                    if (file.size > CONFIG.MAX_FILE_SIZE_MB * 1024 * 1024) {
                        return alert(`Файл слишком большой. Максимум ${CONFIG.MAX_FILE_SIZE_MB} МБ`);
                    }

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        let type = 'document';
                        if (file.type.startsWith('image')) type = 'image';
                        else if (file.type.startsWith('audio')) type = 'audio';
                        else if (file.type.startsWith('video')) type = 'video';
                        
                        Store.mediaAttachment = {
                            type: type,
                            data: e.target.result,
                            name: file.name
                        };
                        
                        const panel = document.getElementById('media-preview-panel');
                        const img = document.getElementById('media-preview-img');
                        
                        panel.classList.remove('d-none');
                        document.getElementById('media-preview-name').innerText = file.name;
                        
                        if (type === 'image') {
                            img.src = e.target.result;
                        } else {
                            img.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" style="background:%23333"><text x="5" y="30" fill="white" font-size="12">FILE</text></svg>';
                        }
                        
                        App.Chat.handleTyping(document.getElementById('message-input'));
                    };
                    reader.readAsDataURL(file);
                },
                
                clear: () => {
                    Store.mediaAttachment = null;
                    document.getElementById('media-preview-panel').classList.add('d-none');
                    document.getElementById('file-input').value = '';
                    App.Chat.handleTyping(document.getElementById('message-input'));
                }
            },

            // --- ГОЛОСОВЫЕ СООБЩЕНИЯ ---
            Voice: {
                stream: null,
                recorder: null,
                chunks: [],
                
                start: async () => {
                    try {
                        App.Voice.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        App.Voice.recorder = new MediaRecorder(App.Voice.stream);
                        App.Voice.chunks = [];
                        
                        App.Voice.recorder.ondataavailable = (e) => {
                            if (e.data.size > 0) App.Voice.chunks.push(e.data);
                        };
                        
                        App.Voice.recorder.onstop = () => {
                            const blob = new Blob(App.Voice.chunks, { type: 'audio/webm' });
                            const reader = new FileReader();
                            reader.onload = (e) => {
                                Store.socket.emit('send_message', {
                                    token: Store.token,
                                    receiver_id: Store.activeChatId,
                                    text: '',
                                    media_type: 'audio',
                                    media_data: e.target.result
                                });
                            };
                            reader.readAsDataURL(blob);
                            App.Voice.stream.getTracks().forEach(track => track.stop());
                        };
                        
                        App.Voice.recorder.start();
                        document.getElementById('btn-record').classList.add('is-recording');
                        
                    } catch (error) {
                        alert('Доступ к микрофону запрещен или недоступен.');
                    }
                },
                
                stop: () => {
                    if (App.Voice.recorder && App.Voice.recorder.state === 'recording') {
                        App.Voice.recorder.stop();
                        document.getElementById('btn-record').classList.remove('is-recording');
                    }
                }
            },

            // --- КОНТЕКСТНОЕ МЕНЮ ---
            ContextMenu: {
                show: (event, msgId, currentText) => {
                    event.preventDefault(); 
                    
                    const menu = document.getElementById('message-context-menu');
                    menu.style.display = 'block';
                    
                    let x = event.pageX || event.clientX;
                    let y = event.pageY || event.clientY;
                    
                    if (x + 180 > window.innerWidth) x = window.innerWidth - 190;
                    if (y + 100 > window.innerHeight) y = window.innerHeight - 110;
                    
                    menu.style.left = `${x}px`;
                    menu.style.top = `${y}px`;
                    
                    document.getElementById('ctx-action-delete').onclick = (e) => {
                        e.stopPropagation();
                        Store.socket.emit('delete_message', {
                            token: Store.token,
                            msg_id: msgId
                        });
                        App.ContextMenu.hide();
                    };
                    
                    document.getElementById('ctx-action-edit').onclick = (e) => {
                        e.stopPropagation();
                        Store.editingMessageId = msgId;
                        const input = document.getElementById('message-input');
                        input.value = currentText || '';
                        App.Chat.handleTyping(input);
                        input.focus();
                        App.ContextMenu.hide();
                    };
                },
                
                hide: () => {
                    document.getElementById('message-context-menu').style.display = 'none';
                }
            },

            // --- INTERSECTION OBSERVER ---
            Observers: {
                initPagination: () => {
                    const container = document.getElementById('messages-container');
                    container.addEventListener('scroll', () => {
                        if (container.scrollTop === 0 && Store.hasMoreMessages && !Store.isFetchingMessages) {
                            App.Chat.fetchHistory();
                        }
                    });
                }
            },

            // --- UI ИНТЕРФЕЙСЫ ---
            UI: {
                renderMyProfile: () => {
                    document.getElementById('my-name').innerText = Store.me.username;
                    const myAv = document.getElementById('my-avatar');
                    myAv.style.backgroundImage = Utils.getAvatarStyle(Store.me.username, Store.me.avatar_data);
                    myAv.innerText = (Store.me.avatar_data && Store.me.avatar_data.length > 10) ? '' : Store.me.username[0].toUpperCase();
                },
                
                closeMobileChat: () => {
                    document.getElementById('app-layout').classList.remove('is-chat-open');
                },

                Settings: {
                    tempAvatarData: null,
                    
                    open: () => {
                        const modal = document.getElementById('modal-settings');
                        modal.classList.add('is-active');
                        
                        document.getElementById('settings-username').value = Store.me.username;
                        document.getElementById('settings-bio').value = Store.me.bio || '';
                        
                        const preview = document.getElementById('settings-avatar-preview');
                        preview.style.backgroundImage = Utils.getAvatarStyle(Store.me.username, Store.me.avatar_data);
                        preview.innerText = Store.me.avatar_data ? '' : Store.me.username[0].toUpperCase();
                        
                        App.UI.Settings.tempAvatarData = Store.me.avatar_data;
                    },
                    
                    handleAvatarChange: (event) => {
                        const file = event.target.files[0];
                        if (!file) return;
                        if (file.size > 2 * 1024 * 1024) return alert('Аватарка максимум 2 МБ');
                        
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            App.UI.Settings.tempAvatarData = e.target.result;
                            const preview = document.getElementById('settings-avatar-preview');
                            preview.style.backgroundImage = `url(${e.target.result})`;
                            preview.innerText = '';
                        };
                        reader.readAsDataURL(file);
                    },
                    
                    save: async () => {
                        const newName = document.getElementById('settings-username').value.trim();
                        const newBio = document.getElementById('settings-bio').value.trim();
                        
                        if (!newName) return alert('Имя не может быть пустым');
                        
                        try {
                            await Utils.apiRequest('/update_profile', 'POST', {
                                username: newName,
                                bio: newBio,
                                avatar_data: App.UI.Settings.tempAvatarData
                            });
                            
                            Store.me.username = newName;
                            Store.me.bio = newBio;
                            Store.me.avatar_data = App.UI.Settings.tempAvatarData;
                            Store.saveAuth(Store.token, Store.me);
                            
                            App.UI.renderMyProfile();
                            App.UI.Settings.close();
                            
                        } catch (error) {
                            alert(error.message);
                        }
                    },
                    
                    close: () => {
                        document.getElementById('modal-settings').classList.remove('is-active');
                    }
                },

                Profile: {
