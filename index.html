<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Messenger</title>

<style>

body{
font-family:Arial;
background:#0e1621;
color:white;
margin:0;
}

#login{
padding:20px;
}

#chat{
display:none;
height:100vh;
}

#users{
width:250px;
background:#17212b;
height:100%;
float:left;
overflow:auto;
}

#messages{
margin-left:250px;
display:flex;
flex-direction:column;
height:100%;
}

#msglist{
flex:1;
overflow:auto;
padding:20px;
}

.msg{
margin:5px;
padding:10px;
background:#182533;
border-radius:8px;
}

.me{
background:#2b5278;
}

#send{
display:flex;
padding:10px;
background:#17212b;
}

input{
padding:10px;
border:none;
}

button{
padding:10px;
}

.user{
padding:10px;
cursor:pointer;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<div id="login">

<h2>Login</h2>

<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

</div>

<div id="chat">

<div id="users"></div>

<div id="messages">

<div id="msglist"></div>

<div id="send">
<input id="text" style="flex:1">
<button onclick="send()">Send</button>
</div>

</div>

</div>

<script>

let token=null
let user_id=null
let current=null

async function register(){

let r=await fetch("/api/register",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})

let j=await r.json()

token=j.token
user_id=j.user_id

start()

}

async function login(){

let r=await fetch("/api/login",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})

let j=await r.json()

token=j.token
user_id=j.user_id

start()

}

function start(){

login.style.display="none"
chat.style.display="block"

loadUsers()

}

async function loadUsers(){

let r=await fetch("/api/users",{
headers:{Authorization:token}
})

let users=await r.json()

usersDiv.innerHTML=""

users.forEach(u=>{

let d=document.createElement("div")

d.className="user"
d.innerText=u.username

d.onclick=()=>{
current=u.id
loadMessages()
}

users.appendChild(d)

})

}

async function loadMessages(){

let r=await fetch(`/api/messages?receiver_id=${current}`,{
headers:{Authorization:token}
})

let msgs=await r.json()

msglist.innerHTML=""

msgs.reverse().forEach(m=>{

let d=document.createElement("div")

d.className="msg"

if(m.sender_id==user_id)
d.classList.add("me")

d.innerText=m.text

msglist.appendChild(d)

})

}

async function send(){

let t=text.value

text.value=""

await fetch("/api/messages",{
method:"POST",
headers:{
'Content-Type':'application/json',
Authorization:token
},
body:JSON.stringify({
receiver_id:current,
text:t
})
})

loadMessages()

}

setInterval(()=>{
if(current)loadMessages()
},2000)

</script>

</body>
</html>
